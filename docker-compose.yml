version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: finance
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./finance-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@db:5432/finance
      SECRET_KEY: your-secret-key
      DEBUG: true
      ALLOWED_ORIGINS: "*"
    depends_on:
      - db
    volumes:
      - ./finance-backend:/app
    command: sh -c "alembic upgrade head && gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --reload"

volumes:
  postgres_data: